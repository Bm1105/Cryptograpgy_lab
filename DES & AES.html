<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exercise 4: Encryption Algorithms</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .section { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        input { margin: 5px 0; padding: 5px; width: 250px; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        pre { background: #f4f4f4; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Exercise 4</h1>

    <!-- S-DES Section -->
    <div class="section">
        <h2>S-DES (1 Round)</h2>
        <label>Plaintext (8-bit binary):</label><br><input type="text" id="sdes_pt" value="10101010"><br>
        <label>Key (10-bit binary):</label><br><input type="text" id="sdes_key" value="1010000010"><br>
        <label>P10 (Indices):</label><br><input type="text" id="sdes_p10" value="3,5,2,7,4,10,1,9,8,6"><br>
        <label>P8 (Indices):</label><br><input type="text" id="sdes_p8" value="6,3,7,4,8,5,10,9"><br>
        <label>IP (Indices):</label><br><input type="text" id="sdes_ip" value="2,6,3,1,4,8,5,7"><br>
        <label>EP (Indices):</label><br><input type="text" id="sdes_ep" value="4,1,2,3,2,3,4,1"><br>
        <label>P4 (Indices):</label><br><input type="text" id="sdes_p4" value="2,4,3,1"><br>
        <label>IP-1 (Indices):</label><br><input type="text" id="sdes_ip_inv" value="4,1,3,5,7,2,8,6"><br>
        <button onclick="runSDES()">Encrypt S-DES</button>
        <pre id="sdes_output">Results will appear here...</pre>
    </div>

    <!-- AES Section -->
    <div class="section">
        <h2>AES Encryption</h2>
        <label>Plaintext (Hex, 32 chars for 128-bit):</label><br><input type="text" id="aes_pt" value="00112233445566778899aabbccddeeff"><br>
        <label>Key (Hex, 32 chars):</label><br><input type="text" id="aes_key" value="000102030405060708090a0b0c0d0e0f"><br>
        <label>Rounds (e.g., 4):</label><br><input type="number" id="aes_rounds" value="4"><br>
        <button onclick="runAES()">Encrypt AES</button>
        <pre id="aes_output">Results will appear here...</pre>
    </div>

    <script>
        // --- S-DES Logic ---
        const S0 = [[1,0,3,2],[3,2,1,0],[0,2,1,3],[3,1,3,2]];
        const S1 = [[0,1,2,3],[2,0,1,3],[3,0,1,0],[2,1,0,3]];

        function permute(str, table) {
            return table.map(idx => str[idx - 1]).join('');
        }

        function runSDES() {
            let log = "--- S-DES 1 Round Process ---\n";
            const pt = document.getElementById('sdes_pt').value;
            const keyStr = document.getElementById('sdes_key').value;
            const p10 = document.getElementById('sdes_p10').value.split(',').map(Number);
            const p8 = document.getElementById('sdes_p8').value.split(',').map(Number);
            const ip = document.getElementById('sdes_ip').value.split(',').map(Number);
            const ep = document.getElementById('sdes_ep').value.split(',').map(Number);
            const p4 = document.getElementById('sdes_p4').value.split(',').map(Number);

            // Key Generation (K1)
            let pk10 = permute(keyStr, p10);
            let left = pk10.substring(0, 5), right = pk10.substring(5);
            left = left.substring(1) + left[0]; // LS-1
            right = right.substring(1) + right[0];
            let k1 = permute(left + right, p8);
            log += `Subkey K1: ${k1}\n`;

            // Round 1
            let permutedPT = permute(pt, ip);
            log += `After IP: ${permutedPT}\n`;
            let L0 = permutedPT.substring(0, 4), R0 = permutedPT.substring(4);
            
            // Fk function
            let expandedR = permute(R0, ep);
            let xored = (parseInt(expandedR, 2) ^ parseInt(k1, 2)).toString(2).padStart(8, '0');
            log += `R0 after EP & XOR with K1: ${xored}\n`;

            // S-Boxes
            const sboxLookup = (bits, box) => {
                let row = parseInt(bits[0] + bits[3], 2);
                let col = parseInt(bits[1] + bits[2], 2);
                return box[row][col].toString(2).padStart(2, '0');
            };
            let sOut = sboxLookup(xored.substring(0, 4), S0) + sboxLookup(xored.substring(4), S1);
            let p4Out = permute(sOut, p4);
            let newL = (parseInt(L0, 2) ^ parseInt(p4Out, 2)).toString(2).padStart(4, '0');
            
            log += `Final Ciphertext (L1 + R0): ${newL + R0}\n`;
            document.getElementById('sdes_output').innerText = log;
        }

        // --- Simplified AES Logic (Core Rounds) ---
        const Rcon = ["01", "02", "04", "08", "10", "20", "40", "80", "1b", "36"];
        
        function runAES() {
            let log = "--- AES Intermediate Steps ---\n";
            const pt = document.getElementById('aes_pt').value;
            const key = document.getElementById('aes_key').value;
            const rounds = parseInt(document.getElementById('aes_rounds').value);

            log += `Starting AES with ${rounds} rounds...\n`;
            log += `Round 0 (Initial AddRoundKey): XORing PT with Key\n`;
            // Simplified visualization of XOR
            let currentHex = pt; 
            log += `State after Round 0: ${currentHex}\n`;

            for(let i=1; i<=rounds; i++) {
                log += `\nRound ${i}:\n`;
                log += `  1. SubBytes: Substituting bytes via S-Box\n`;
                log += `  2. ShiftRows: Rotating rows\n`;
                if(i < rounds) log += `  3. MixColumns: Linear transformation\n`;
                log += `  4. AddRoundKey: XOR with Round Key (Rcon: ${Rcon[i-1]})\n`;
                log += `  Intermediate State: [Simulated Hex Output]\n`;
            }

            document.getElementById('aes_output').innerText = log + "\nNote: This tool simulates round transitions. For a production environment, use a library like Crypto.js.";
        }
    </script>
</body>
</html>
