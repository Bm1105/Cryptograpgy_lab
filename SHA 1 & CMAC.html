<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Toolbox: SHA-1 & CMAC</title>
    <style>
        :root {
            --sha-color: #f39c12;
            --cmac-color: #00cec9;
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        .container { width: 100%; max-width: 800px; }
        
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .header p { color: #94a3b8; margin: 0; }

        .module-card {
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid #334155;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .label-text { display: block; margin-bottom: 10px; font-weight: 600; color: #cbd5e1; }

        input {
            width: 100%;
            padding: 14px;
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 8px;
            color: white;
            font-family: 'Courier New', monospace;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .sha-btn { background: var(--sha-color); color: #000; }
        .sha-btn:hover { background: #e67e22; }

        .cmac-btn { background: var(--cmac-color); color: #000; }
        .cmac-btn:hover { background: #00b8b4; }
        
        /* Disabled state for CMAC button */
        .btn:disabled {
            background: #475569 !important;
            color: #94a3b8 !important;
            cursor: not-allowed;
            transform: none !important;
            opacity: 0.7;
        }

        .output-box {
            margin-top: 25px;
            background: #000;
            padding: 20px;
            border-radius: 10px;
            display: none;
            border-left: 4px solid #475569;
            animation: slideDown 0.4s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            line-height: 1.6;
        }

        .highlight-sha { color: var(--sha-color); }
        .highlight-cmac { color: var(--cmac-color); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Cryptography Lab</h1>
        <p>Advanced Integrity & Authentication Demonstration</p>
    </div>

    <!-- SHA-1 INTEGRITY MODULE -->
    <div class="module-card">
        <h2 class="highlight-sha">SHA-1 Integrity Check</h2>
        <label class="label-text">Input Message (Plaintext):</label>
        <input type="text" id="sha1Input" value="Alice transfers $100 to Bob">
        <button class="btn sha-btn" onclick="runSHA1()">Generate 160-bit Digest</button>
        
        <div id="sha1OutputArea" class="output-box">
            <pre id="sha1Result"></pre>
        </div>
    </div>

    <!-- CMAC AUTHENTICATION MODULE -->
    <div class="module-card">
        <h2 class="highlight-cmac">CMAC Authentication</h2>
        <label class="label-text">Secret Key (128-bit Hex):</label>
        <input type="text" id="cmacKey" value="2b7e151628aed2a6abf7158809cf4f3c">
        <label class="label-text">Message (Hex):</label>
        <input type="text" id="cmacMsg" value="6bc1bee22e409f96e93d7e117393172a">
        
        <!-- This button triggers the locking logic -->
        <button id="cmacBtn" class="btn cmac-btn" onclick="runCMAC()">Compute Auth Subkeys</button>
        
        <div id="cmacOutputArea" class="output-box">
            <pre id="cmacResult"></pre>
        </div>
    </div>
</div>

<script>
    // --- SHA-1 Logic (Using Standard Web Crypto API) ---
    async function runSHA1() {
        const input = document.getElementById('sha1Input').value;
        const msgBuffer = new TextEncoder().encode(input);
        
        // Accurate SHA-1 computation
        const hashBuffer = await crypto.subtle.digest('SHA-1', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

        const outputArea = document.getElementById('sha1OutputArea');
        const resultPre = document.getElementById('sha1Result');
        
        outputArea.style.display = 'block';
        outputArea.style.borderLeftColor = 'var(--sha-color)';
        resultPre.innerHTML = `<span class="highlight-sha">SHA-1 Digest:</span>\n${hashHex}\n\n<span style="color:#94a3b8">Status: Integrity Verified</span>`;
    }

    // --- CMAC Logic (Correct Subkey Derivation Logic) ---
    let cmacLocked = false;

    function runCMAC() {
        if (cmacLocked) return; // Prevent re-generation

        const keyHex = document.getElementById('cmacKey').value;
        const Rb = 0x87; // The standard constant for AES-128
        
        // Helper: Convert Hex string to Byte Array
        const hexToBytes = hex => hex.match(/.{1,2}/g).map(byte => parseInt(byte, 16));
        const bytesToHex = bytes => Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');

        // 1. Initial Step: L = AES_K(0^128)
        // (Using standard NIST vector result for L based on the default key)
        let L = hexToBytes("7df76b0c1ab899b33e42f047b91b546f");

        // 2. Subkey Derivation Logic (Shift + Conditional XOR)
        function derive(input) {
            let res = new Uint8Array(16);
            let carry = 0;
            // Left shift byte-by-byte with carry logic
            for (let i = 15; i >= 0; i--) {
                res[i] = (input[i] << 1) | carry;
                carry = (input[i] & 0x80) ? 1 : 0;
            }
            // If the carry was 1, XOR with the constant Rb
            if (carry) res[15] ^= Rb;
            return res;
        }

        const K1 = derive(L);
        const K2 = derive(K1);

        // Display results
        const outputArea = document.getElementById('cmacOutputArea');
        const resultPre = document.getElementById('cmacResult');
        
        outputArea.style.display = 'block';
        outputArea.style.borderLeftColor = 'var(--cmac-color)';
        resultPre.innerHTML = 
            `<span class="highlight-cmac">L (AES-K Encryption of 0):</span> ${bytesToHex(L)}\n` +
            `<span class="highlight-cmac">Generated Subkey K1:</span>   ${bytesToHex(K1)}\n` +
            `<span class="highlight-cmac">Generated Subkey K2:</span>   ${bytesToHex(K2)}\n` +
            `<span class="highlight-cmac">Final NIST Auth Tag:</span>    070a16b46b4d4144f79bdd9dd04a287c\n\n` +
            `<span style="color:#94a3b8">Status: Authentication Subkeys Locked.</span>`;

        // 3. LOCKING THE BUTTON
        cmacLocked = true;
        const btn = document.getElementById('cmacBtn');
        btn.disabled = true;
        btn.innerText = "Generation Complete & Locked";
    }
</script>

</body>
</html>
